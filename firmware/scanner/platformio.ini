[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
  knolleary/PubSubClient@^2.8

build_flags =
  -D DEVICE_KIND=\"scanner\"
  -D MQTT_TOPIC_LOC=\"ignara/location/room-A3\"
  -D WIFI_SSID=\"CHANGE_ME_WIFI_SSID\"
  -D WIFI_PASSWORD=\"CHANGE_ME_WIFI_PASSWORD\"
  -D MQTT_HOST=\"192.168.1.10\"
  -D MQTT_PORT=1883
