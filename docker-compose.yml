services:
  postgres:
    image: postgres:16
    container_name: ignara-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ignara
      POSTGRES_USER: ignara
      POSTGRES_PASSWORD: ignara123
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ignara-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: ignara-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./data/mosquitto:/mosquitto/data
      - ./data/mosquitto/log:/mosquitto/log
    restart: unless-stopped

  api:
    image: node:20-alpine
    container_name: ignara-api
    working_dir: /workspace
    depends_on:
      - postgres
      - redis
      - mosquitto
    ports:
      - "3001:3001"
    command: >
      sh -c "corepack enable && corepack prepare pnpm@9.12.0 --activate &&
      pnpm install --no-frozen-lockfile && pnpm --filter @ignara/api dev"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://ignara:ignara123@postgres:5432/ignara
      REDIS_URL: redis://redis:6379
      MQTT_URL: mqtt://mosquitto:1883
      JWT_ACCESS_SECRET: replace-me
      JWT_ACCESS_TTL: 15m
      DEV_USER_EMAILS: admin@ignara.local
    volumes:
      - ./:/workspace
      - ./data/minio:/workspace/data

  web:
    image: node:20-alpine
    container_name: ignara-web
    working_dir: /workspace
    depends_on:
      - api
    ports:
      - "3000:3000"
    command: >
      sh -c "corepack enable && corepack prepare pnpm@9.12.0 --activate &&
      pnpm install --no-frozen-lockfile && pnpm --filter @ignara/web dev"
    volumes:
      - ./:/workspace
